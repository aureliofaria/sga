name: CI

on:
  push:
    branches: [main]
  pull_request:

# Menor privilégio para o GITHUB_TOKEN: o CI só precisa ler o código.
permissions:
  contents: read

# Cancela execuções anteriores ainda em andamento para o mesmo ref ao surgir
# um novo push (evita gastar runners com commits já superados).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (tests + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=backend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: backend

      - name: Run tests
        run: npm test --workspace=backend

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=frontend
